name: StepReceipt
options:
  minimumXcodeGenVersion: 2.40.0
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "37"
    DEVELOPMENT_TEAM: "U63TLL4JY4"
targets:
  StepReceipt:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - StepReceiptApp
      - Sources/StepReceiptCore
      - StepReceiptLiveActivityShared
      - StepReceiptWatchShared
    dependencies:
      - sdk: WeatherKit.framework
      - sdk: CoreLocation.framework
      - target: StepReceiptLiveActivityWidget
        embed: true
      - target: StepReceiptWatch
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tyronsamaroo.stepreceipt
        INFOPLIST_FILE: StepReceiptApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: StepReceiptApp/StepReceipt.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: StepReceiptApp/StepReceiptDebug.entitlements
        Release:
          CODE_SIGN_ENTITLEMENTS: StepReceiptApp/StepReceipt.entitlements
    scheme:
      testTargets:
        - StepReceiptTests
        - StepReceiptUITests
  StepReceiptTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.tyronsamaroo.stepreceipt.tests
    sources:
      - Tests/StepReceiptCoreTests
      - Tests/StepReceiptAppTests
      - Sources/StepReceiptCore
      - StepReceiptApp/Services
      - StepReceiptLiveActivityShared
      - StepReceiptWatchShared
  StepReceiptUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.tyronsamaroo.stepreceipt.uitests
    sources:
      - Tests/StepReceiptUITests
    dependencies:
      - target: StepReceipt
  StepReceiptLiveActivityWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - StepReceiptLiveActivityWidget
      - StepReceiptLiveActivityShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tyronsamaroo.stepreceipt.liveactivity
        INFOPLIST_FILE: StepReceiptLiveActivityWidget/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        SKIP_INSTALL: YES
  StepReceiptWatch:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - StepReceiptWatch
    dependencies:
      - target: StepReceiptWatchExtension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tyronsamaroo.stepreceipt.watchkitapp
        INFOPLIST_FILE: StepReceiptWatch/Info.plist
        TARGETED_DEVICE_FAMILY: "4"
        SKIP_INSTALL: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  StepReceiptWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - StepReceiptWatchExtension
      - StepReceiptWatchShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tyronsamaroo.stepreceipt.watchkitapp.watchkitextension
        INFOPLIST_FILE: StepReceiptWatchExtension/Info.plist
        TARGETED_DEVICE_FAMILY: "4"
        SKIP_INSTALL: YES
        WK_APP_BUNDLE_IDENTIFIER: com.tyronsamaroo.stepreceipt.watchkitapp
